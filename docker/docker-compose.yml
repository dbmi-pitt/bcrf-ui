services:
  bcrf-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1002}
        HOST_GID: ${HOST_GID:-1002}
        PORT_MAPPING: ${PORT_MAPPING:-3002}
    container_name: bcrf-ui
    hostname: bcrf-ui
    image: dbmi/bcrf-ui:${VERSION}
    restart: unless-stopped
    platform: linux/amd64
    init: true
    volumes:
      - '../public/content/banner.json:/usr/src/app/public/content/banner.json'
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:${PORT_MAPPING}']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - '${PORT_MAPPING:-3002}:${PORT_MAPPING:-3002}'
    env_file:
      - ../.env
    networks:
      - dbmi_docker_network
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: ${BCRF_UI_CLOUDWATCH_LOG_GROUP:?err}

networks:
  dbmi_docker_network:
    external: true
